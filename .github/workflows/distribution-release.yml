name: Distribution Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-distribution:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build distribution package
        run: mvn -B -pl distribution -am package -DskipTests

      - name: Verify packaged distribution
        run: bash distribution/target/full-distribution/full-distribution/bin/verify.sh

      - name: Generate release manifest and checksums
        run: bash bin/linux/dist-release-bundle.sh

      - name: Upload distribution release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distribution-release-${{ github.ref_name }}
          path: |
            distribution/target/full-distribution.zip
            distribution/target/release/full-distribution.sha256
            distribution/target/release/full-distribution-manifest.json
          if-no-files-found: error
