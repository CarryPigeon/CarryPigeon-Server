services:
  mysql:
    image: mysql:8.4
    container_name: carrypigeon-mysql
    restart: unless-stopped
    environment:
      # 职责：初始化默认数据库与账号，供后续 database-impl 接入。
      MYSQL_DATABASE: ${MYSQL_DATABASE:-carrypigeon}
      MYSQL_USER: ${MYSQL_USERNAME:-carrypigeon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-carrypigeon123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - carrypigeon-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - carrypigeon-network

  redis:
    image: redis:7.4-alpine
    container_name: carrypigeon-redis
    restart: unless-stopped
    environment:
      # 职责：向容器内健康检查提供与 Redis 启动命令一致的访问密码。
      REDIS_PASSWORD: ${REDIS_PASSWORD:-carrypigeon123}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-carrypigeon123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - carrypigeon-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - carrypigeon-network

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: carrypigeon-minio
    restart: unless-stopped
    environment:
      # 职责：定义 MinIO 管理账号，供后续对象存储 impl 接入。
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carrypigeon}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-carrypigeon}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - carrypigeon-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - carrypigeon-network

  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    container_name: carrypigeon-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set carrypigeon http://minio:9000 "${MINIO_ROOT_USER:-carrypigeon}" "${MINIO_ROOT_PASSWORD:-carrypigeon123}" &&
        mc mb --ignore-existing carrypigeon/"${MINIO_BUCKET:-carrypigeon}"
    networks:
      - carrypigeon-network

  nginx:
    image: nginx:1.27-alpine
    container_name: carrypigeon-nginx
    profiles:
      - edge
    restart: unless-stopped
    environment:
      # 职责：定义本地反代入口的 server_name，默认用于本机开发证书。
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      # 职责：定义宿主机上 jar 应用的 Spring MVC HTTP 端口。
      NGINX_BACKEND_HTTP_HOST: ${NGINX_BACKEND_HTTP_HOST:-host.docker.internal}
      NGINX_BACKEND_HTTP_PORT: ${NGINX_BACKEND_HTTP_PORT:-8080}
      # 职责：定义宿主机上 jar 应用的 Netty WebSocket 端口。
      NGINX_BACKEND_WS_HOST: ${NGINX_BACKEND_WS_HOST:-host.docker.internal}
      NGINX_BACKEND_WS_PORT: ${NGINX_BACKEND_WS_PORT:-18080}
      # 职责：限制经反代上传到服务端的请求体大小。
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-100m}
      # 职责：将服务发现中的内部 ws_url 替换为客户端可访问的 WSS 入口。
      NGINX_BACKEND_WS_DISCOVERY_URL: ${NGINX_BACKEND_WS_DISCOVERY_URL:-ws://127.0.0.1:18080/api/ws}
      NGINX_PUBLIC_WS_URL: ${NGINX_PUBLIC_WS_URL:-wss://localhost/api/ws}
      # 职责：限制官方 Nginx entrypoint 只替换本服务定义的变量，避免误替换 Nginx 内置变量。
      NGINX_ENVSUBST_FILTER: "^NGINX_"
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx/templates/carrypigeon.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - carrypigeon-network

volumes:
  carrypigeon-mysql-data:
  carrypigeon-redis-data:
  carrypigeon-minio-data:

networks:
  carrypigeon-network:
    driver: bridge
