services:
  mysql:
    image: mysql:8.4
    container_name: carrypigeon-mysql
    restart: unless-stopped
    environment:
      # 职责：初始化默认数据库与账号，供后续 database-impl 接入。
      MYSQL_DATABASE: ${MYSQL_DATABASE:-carrypigeon}
      MYSQL_USER: ${MYSQL_USERNAME:-carrypigeon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-carrypigeon123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - carrypigeon-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - carrypigeon-network

  redis:
    image: redis:7.4-alpine
    container_name: carrypigeon-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-carrypigeon123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - carrypigeon-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - carrypigeon-network

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: carrypigeon-minio
    restart: unless-stopped
    environment:
      # 职责：定义 MinIO 管理账号，供后续对象存储 impl 接入。
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carrypigeon}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-carrypigeon123}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - carrypigeon-minio-data:/data
    networks:
      - carrypigeon-network

volumes:
  carrypigeon-mysql-data:
  carrypigeon-redis-data:
  carrypigeon-minio-data:

networks:
  carrypigeon-network:
    driver: bridge
